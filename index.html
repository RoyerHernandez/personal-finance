<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Finanzas Personales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Overlay mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>&#x1F4CE; FINANZAS</h2>
                <button class="sidebar-toggle" id="sidebarToggle" title="Colapsar">&#9776;</button>
            </div>
            <ul class="nav-menu">
                <li><a href="#" data-page="dashboard" class="nav-link active"><span class="nav-icon">&#x1F4CA;</span><span class="nav-text">Dashboard</span></a></li>
                <li><a href="#" data-page="periods" class="nav-link"><span class="nav-icon">&#x1F4C5;</span><span class="nav-text">Periodos</span></a></li>
                <li><a href="#" data-page="debts" class="nav-link"><span class="nav-icon">&#x1F4B3;</span><span class="nav-text">Deudas y Creditos</span></a></li>
                <li><a href="#" data-page="expenses" class="nav-link"><span class="nav-icon">&#x1F41C;</span><span class="nav-text">Gastos Hormiga</span></a></li>
                <li><a href="#" data-page="income" class="nav-link"><span class="nav-icon">&#x1F4B0;</span><span class="nav-text">Ingresos</span></a></li>
                <li><a href="#" data-page="settings" class="nav-link"><span class="nav-icon">&#x2699;&#xFE0F;</span><span class="nav-text">Configuracion</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-footer-info">
                    <div class="sidebar-footer-name">Royer Hernandez</div>
                    <div class="sidebar-footer-email">ing.royerhernandez@gmail.com</div>
                </div>
            </div>
        </nav>

        <!-- Main -->
        <div class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="btn-icon mobile-menu-btn" id="mobileMenuBtn">&#9776;</button>
                    <span id="topbarDate"></span>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">&#x1F319;</button>
                    <button class="btn btn-primary btn-small" onclick="financeData.saveData(); showToast('Datos guardados', 'success')">
                        Guardar
                    </button>
                </div>
            </header>

            <!-- Content -->
            <main class="main-content">
                <div id="app-content"></div>
            </main>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="lib/chart.min.js"></script>
    <script src="js/data.js" defer></script>
    <script src="js/modules/dashboard.js" defer></script>
    <script src="js/modules/periods.js" defer></script>
    <script src="js/modules/debts.js" defer></script>
    <script src="js/modules/expenses.js" defer></script>
    <script src="js/modules/income.js" defer></script>
    <script src="js/modules/settings.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
