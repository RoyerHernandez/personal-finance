<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Personales</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Overlay mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💎 Finanzas</h2>
                <button class="sidebar-toggle" id="sidebarToggle" title="Colapsar">☰</button>
            </div>
            <ul class="nav-menu">
                <li><a href="#" data-page="dashboard" class="nav-link active"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></a></li>
                <li><a href="#" data-page="periods" class="nav-link"><span class="nav-icon">📅</span><span class="nav-text">Períodos</span></a></li>
                <li><a href="#" data-page="debts" class="nav-link"><span class="nav-icon">💳</span><span class="nav-text">Deudas y Créditos</span></a></li>
                <li><a href="#" data-page="expenses" class="nav-link"><span class="nav-icon">🐜</span><span class="nav-text">Gastos Hormiga</span></a></li>
                <li><a href="#" data-page="income" class="nav-link"><span class="nav-icon">💰</span><span class="nav-text">Ingresos</span></a></li>
                <li><a href="#" data-page="settings" class="nav-link"><span class="nav-icon">⚙️</span><span class="nav-text">Configuración</span></a></li>
            </ul>
        </nav>

        <!-- Main -->
        <div class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="btn-icon mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <span id="topbarDate"></span>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-secondary btn-small" onclick="financeData.saveData(); showToast('Datos guardados', 'success')">
                        💾 Guardar
                    </button>
                </div>
            </header>

            <!-- Content -->
            <main class="main-content">
                <div id="app-content"></div>
            </main>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="lib/chart.min.js"></script>
    <script src="js/data.js" defer></script>
    <script src="js/modules/dashboard.js" defer></script>
    <script src="js/modules/periods.js" defer></script>
    <script src="js/modules/debts.js" defer></script>
    <script src="js/modules/expenses.js" defer></script>
    <script src="js/modules/income.js" defer></script>
    <script src="js/modules/settings.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
